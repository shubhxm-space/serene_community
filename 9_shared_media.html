<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/><meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<title>CommunityHub — Shared Media</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="tw-config.js"></script>
<link rel="stylesheet" href="style.css">
<style>
body{font-family:'Inter',sans-serif;background:#f9f9ff;}
.gallery{columns:4 180px;gap:12px;}
.gallery.small{columns:6 130px;}
.gallery.large{columns:3 260px;}
@media(max-width:640px){.gallery{columns:2 140px;}}
.gallery-item{break-inside:avoid;margin-bottom:12px;border-radius:12px;overflow:hidden;cursor:pointer;position:relative;border:1px solid #e0e2eb;background:#fff;transition:all .2s;}
.gallery-item:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.08);border-color:#c1c6d5;}
.gallery-item img{width:100%;display:block;}
.gallery-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.6) 0%,transparent 50%);opacity:0;transition:opacity .2s;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;}
.gallery-item:hover .gallery-overlay{opacity:1;}
.overlay-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity .2s;}
.gallery-item:hover .overlay-actions{opacity:1;}
.lightbox{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;}
.lightbox.open{display:flex;}
</style>
</head>
<body class="bg-background text-on-surface">
<header class="bg-white border-b border-slate-200 shadow-sm fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-6 h-16" id="app-header"></header>
<div class="flex pt-16 min-h-screen">
<aside class="bg-slate-50 border-r border-slate-200 fixed left-0 h-[calc(100vh-64px)] w-64 hidden lg:flex flex-col py-4 overflow-y-auto" id="app-sidebar"></aside>
<main class="flex-1 lg:ml-64 p-6 xl:p-8">
<div class="max-w-7xl mx-auto">

  <!-- Header -->
  <div class="flex items-center justify-between flex-wrap gap-4 mb-6 fade-up">
    <div>
      <h1 class="text-2xl font-bold text-on-surface">Shared Media</h1>
      <p class="text-sm text-on-surface-variant mt-1">Photos, videos and files from the community</p>
    </div>
  </div>

  <!-- Upload zone -->
  <div id="drop-zone" onclick="document.getElementById('file-inp').click()"
    class="border-2 border-dashed border-outline-variant rounded-xl p-8 text-center cursor-pointer hover:border-primary hover:bg-primary/5 transition-all mb-6 fade-up-2 bg-white">
    <span class="material-symbols-outlined text-5xl text-outline block mb-2">cloud_upload</span>
    <p class="text-base font-semibold text-on-surface">Upload Media</p>
    <p class="text-sm text-on-surface-variant mt-1">Drag &amp; drop images, videos or files — or <span class="text-primary font-medium">click to browse</span></p>
    <input type="file" id="file-inp" multiple accept="image/*,video/*,.pdf,.zip" class="hidden">
    <div class="hidden mt-4 max-w-xs mx-auto" id="upload-prog">
      <div class="h-2 bg-surface-container rounded-full overflow-hidden">
        <div id="upload-bar" class="bg-primary h-2 rounded-full transition-all duration-300" style="width:0%"></div>
      </div>
      <p class="text-xs text-on-surface-variant mt-2" id="upload-label">Uploading...</p>
    </div>
  </div>

  <!-- Stats -->
  <div class="flex gap-4 flex-wrap mb-5 fade-up-2">
    <div class="flex items-center gap-2 text-sm bg-white border border-outline-variant rounded-lg px-4 py-2">
      <span class="material-symbols-outlined text-primary text-[18px]">image</span>
      <strong id="cnt-img">—</strong><span class="text-on-surface-variant">Images</span>
    </div>
    <div class="flex items-center gap-2 text-sm bg-white border border-outline-variant rounded-lg px-4 py-2">
      <span class="material-symbols-outlined text-primary text-[18px]">play_circle</span>
      <strong id="cnt-vid">—</strong><span class="text-on-surface-variant">Videos</span>
    </div>
    <div class="flex items-center gap-2 text-sm bg-white border border-outline-variant rounded-lg px-4 py-2">
      <span class="material-symbols-outlined text-primary text-[18px]">description</span>
      <strong id="cnt-file">—</strong><span class="text-on-surface-variant">Files</span>
    </div>
    <div class="flex items-center gap-2 text-sm bg-white border border-outline-variant rounded-lg px-4 py-2">
      <span class="material-symbols-outlined text-primary text-[18px]">storage</span>
      <strong id="cnt-size">—</strong><span class="text-on-surface-variant">Total</span>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="flex items-center gap-3 flex-wrap mb-6 fade-up-3">
    <div class="flex bg-white border border-outline-variant rounded-full p-1 gap-1">
      <button class="type-btn px-4 py-1.5 rounded-full text-xs font-semibold bg-primary text-white" data-type="all">All</button>
      <button class="type-btn px-4 py-1.5 rounded-full text-xs font-semibold text-on-surface-variant hover:bg-surface-container transition-colors" data-type="image">🖼️ Images</button>
      <button class="type-btn px-4 py-1.5 rounded-full text-xs font-semibold text-on-surface-variant hover:bg-surface-container transition-colors" data-type="video">📹 Videos</button>
      <button class="type-btn px-4 py-1.5 rounded-full text-xs font-semibold text-on-surface-variant hover:bg-surface-container transition-colors" data-type="file">📄 Files</button>
    </div>
    <select id="sort-sel" class="text-sm border border-outline-variant rounded-full px-4 py-2 bg-white text-on-surface focus:outline-none focus:border-primary">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="name">By name</option>
    </select>
    <div class="ml-auto flex items-center gap-2">
      <span class="text-xs text-on-surface-variant" id="result-count"></span>
      <div class="flex gap-1">
        <button class="size-btn w-8 h-8 flex items-center justify-center rounded-lg border border-outline-variant text-sm text-on-surface-variant hover:bg-surface-container" data-size="small" title="Small">⊠</button>
        <button class="size-btn w-8 h-8 flex items-center justify-center rounded-lg border border-outline-variant text-sm bg-primary text-white" data-size="normal" title="Normal">⊞</button>
        <button class="size-btn w-8 h-8 flex items-center justify-center rounded-lg border border-outline-variant text-sm text-on-surface-variant hover:bg-surface-container" data-size="large" title="Large">⊡</button>
      </div>
    </div>
  </div>

  <!-- Gallery -->
  <div class="gallery" id="gallery">
    <div class="gallery-item skeleton" style="height:160px"></div>
    <div class="gallery-item skeleton" style="height:200px"></div>
    <div class="gallery-item skeleton" style="height:140px"></div>
    <div class="gallery-item skeleton" style="height:180px"></div>
    <div class="gallery-item skeleton" style="height:160px"></div>
    <div class="gallery-item skeleton" style="height:200px"></div>
    <div class="gallery-item skeleton" style="height:140px"></div>
    <div class="gallery-item skeleton" style="height:180px"></div>
    <div class="gallery-item skeleton" style="height:160px"></div>
    <div class="gallery-item skeleton" style="height:200px"></div>
    <div class="gallery-item skeleton" style="height:140px"></div>
    <div class="gallery-item skeleton" style="height:180px"></div>
  </div>

  <!-- Empty state -->
  <div id="empty-state" class="hidden text-center py-20">
    <span class="material-symbols-outlined text-6xl text-outline block mb-3">perm_media</span>
    <p class="text-lg font-semibold">No media found</p>
    <p class="text-sm text-on-surface-variant mt-1">Upload something to get started</p>
  </div>

</div>
</main>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button onclick="closeLightbox()" class="absolute top-5 right-5 w-10 h-10 rounded-full bg-white/10 text-white flex items-center justify-center text-lg hover:bg-white/20 transition-colors z-10">✕</button>
  <button onclick="lightboxNav(-1)" class="absolute left-5 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-white/10 text-white flex items-center justify-center text-2xl hover:bg-white/20 transition-colors">‹</button>
  <img id="lightbox-img" src="" alt="" class="max-w-[90vw] max-h-[90vh] rounded-xl object-contain">
  <button onclick="lightboxNav(1)" class="absolute right-5 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-white/10 text-white flex items-center justify-center text-2xl hover:bg-white/20 transition-colors">›</button>
  <div id="lightbox-info" class="absolute bottom-5 left-1/2 -translate-x-1/2 bg-black/60 backdrop-blur-sm text-white text-sm rounded-full px-5 py-2"></div>
</div>

<div class="mobile-bottom-nav fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 z-50 flex items-center justify-around h-16 px-2 md:hidden" id="mobile-nav"></div>

<script src="app.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
const app=initializeApp(FIREBASE_CONFIG),auth=getAuth(app),db=getFirestore(app);
let storage;try{storage=getStorage(app);}catch(_){}
let allMedia=[],filtered=[],activeType='all',gallerySize='normal',lbIdx=0,currentUser;

// Demo colors for placeholder cards
const DEMO_COLORS=[['#d6e3ff','#005ab4'],['#dcd1ff','#6c63ff'],['#ffdbc9','#964400'],['#b6d0ff','#465f88'],['#c8f7de','#10b981'],['#fef3c7','#d97706']];

onAuthStateChanged(auth,async u=>{if(!u){location.href='1_welcome.html';return;}currentUser=u;initLayout(u);await loadMedia();setupUpload();});

async function loadMedia(){
  try{
    const snap=await getDocs(query(collection(db,'media'),orderBy('createdAt','desc')));
    allMedia=[];snap.forEach(d=>allMedia.push({id:d.id,...d.data()}));
    if(!allMedia.length)allMedia=demoMedia(18);
  }catch(e){allMedia=demoMedia(18);}
  updateStats();applyFilters();
}
function demoMedia(n){return Array.from({length:n},(_,i)=>({id:'d'+i,type:i%5===0?'video':i%7===0?'file':'image',name:`Media ${i+1}`,size:Math.floor(Math.random()*3000+200)*1024,uploaderName:'Community Member',uploaderId:'d',palette:DEMO_COLORS[i%DEMO_COLORS.length],createdAt:{toDate:()=>new Date(Date.now()-i*3600000*7)}}));}
function updateStats(){
  const img=allMedia.filter(m=>m.type==='image').length,vid=allMedia.filter(m=>m.type==='video').length,file=allMedia.filter(m=>m.type==='file').length;
  const bytes=allMedia.reduce((s,m)=>s+(m.size||0),0);
  document.getElementById('cnt-img').textContent=img;document.getElementById('cnt-vid').textContent=vid;document.getElementById('cnt-file').textContent=file;
  document.getElementById('cnt-size').textContent=bytes>1e9?(bytes/1e9).toFixed(1)+'GB':bytes>1e6?(bytes/1e6).toFixed(1)+'MB':Math.round(bytes/1024)+'KB';
}
function applyFilters(){
  let m=activeType==='all'?[...allMedia]:allMedia.filter(x=>x.type===activeType);
  const sort=document.getElementById('sort-sel').value;
  if(sort==='oldest')m.sort((a,b)=>a.createdAt?.toDate?.()-b.createdAt?.toDate?.());
  else if(sort==='name')m.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  filtered=m;
  document.getElementById('result-count').textContent=`${filtered.length} items`;
  renderGallery();
}
function renderGallery(){
  const g=document.getElementById('gallery'),e=document.getElementById('empty-state');
  if(!filtered.length){g.innerHTML='';e.classList.remove('hidden');return;}
  e.classList.add('hidden');
  g.innerHTML=filtered.map((m,i)=>itemHTML(m,i)).join('');
}
function itemHTML(m,i){
  const delay=Math.min(i*.04,.5)+'s';
  if(m.type==='image'){
    if(m.url)return`<div class="gallery-item" style="animation:fadeUp .35s ${delay} ease both" onclick="openLightbox(${i})">
      <img src="${m.url}" alt="${m.name||''}" loading="lazy">
      <div class="gallery-overlay"><p class="text-white text-xs font-semibold truncate">${m.name}</p><p class="text-white/70 text-[10px]">${m.uploaderName||'Member'} · ${timeAgo(m.createdAt)}</p></div>
      <div class="overlay-actions"><button onclick="event.stopPropagation();window.open('${m.url}')" class="w-7 h-7 rounded-lg bg-black/50 text-white text-xs flex items-center justify-center backdrop-blur-sm">⬇</button>${m.uploaderId===currentUser?.uid?`<button onclick="event.stopPropagation();deleteItem('${m.id}')" class="w-7 h-7 rounded-lg bg-black/50 text-white text-xs flex items-center justify-center backdrop-blur-sm">🗑</button>`:''}</div>
    </div>`;
    else{
      const bg=(m.palette&&m.palette[0])||'#d6e3ff';
      const fg=(m.palette&&m.palette[1])||'#005ab4';
      return`<div class="gallery-item" style="animation:fadeUp .35s ${delay} ease both;height:${[160,200,140,180][i%4]}px">
        <div class="w-full h-full flex items-center justify-center" style="background:${bg}30">
          <span class="material-symbols-outlined text-4xl opacity-50" style="color:${fg}">image</span>
        </div>
        <div class="gallery-overlay"><p class="text-white text-xs font-semibold">${m.name||'Image'}</p><p class="text-white/70 text-[10px]">${timeAgo(m.createdAt)}</p></div>
      </div>`;
    }
  }
  if(m.type==='video')return`<div class="gallery-item" style="animation:fadeUp .35s ${delay} ease both;height:${[160,200,140][i%3]}px">
    <div class="w-full h-full flex items-center justify-center bg-slate-100">
      <span class="material-symbols-outlined text-5xl text-slate-400">play_circle</span>
    </div>
    <span class="absolute top-2 left-2 px-2 py-0.5 bg-red-500 text-white text-[10px] font-bold rounded-full">VIDEO</span>
    <div class="gallery-overlay"><p class="text-white text-xs font-semibold">${m.name}</p></div>
  </div>`;
  const icons={pdf:'picture_as_pdf',zip:'folder_zip',default:'description'};
  const ext=(m.name||'').split('.').pop().toLowerCase();
  return`<div class="gallery-item p-4" style="animation:fadeUp .35s ${delay} ease both">
    <span class="material-symbols-outlined text-3xl text-primary mb-2 block">${icons[ext]||icons.default}</span>
    <p class="text-xs font-semibold text-on-surface truncate">${m.name}</p>
    <p class="text-[10px] text-on-surface-variant mt-0.5">${m.size?Math.round(m.size/1024)+'KB':'—'}</p>
  </div>`;
}

// Lightbox
window.openLightbox=idx=>{
  lbIdx=idx;const m=filtered[idx];
  if(!m||m.type!=='image')return;
  // Only open lightbox if there's a real URL
  if(!m.url){showToast('No preview available for this item','info');return;}
  document.getElementById('lightbox').classList.add('open');
  document.getElementById('lightbox-img').src=m.url;
  document.getElementById('lightbox-info').textContent=`${m.name||'Image'} · ${m.uploaderName||'Member'} · ${timeAgo(m.createdAt)}`;
  document.body.style.overflow='hidden';
};
window.closeLightbox=()=>{document.getElementById('lightbox').classList.remove('open');document.body.style.overflow='';};
window.lightboxNav=dir=>{let n=lbIdx+dir;while(n>=0&&n<filtered.length&&filtered[n].type!=='image')n+=dir;if(n>=0&&n<filtered.length)openLightbox(n);};
document.addEventListener('keydown',e=>{if(!document.getElementById('lightbox').classList.contains('open'))return;if(e.key==='Escape')closeLightbox();if(e.key==='ArrowRight')lightboxNav(1);if(e.key==='ArrowLeft')lightboxNav(-1);});
window.deleteItem=async id=>{if(!confirm('Delete this item?'))return;try{await deleteDoc(doc(db,'media',id));allMedia=allMedia.filter(m=>m.id!==id);updateStats();applyFilters();showToast('Deleted','info');}catch(e){showToast('Error: '+e.message,'error');}};

// Upload
function setupUpload(){
  const dz=document.getElementById('drop-zone'),fi=document.getElementById('file-inp');
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('border-primary','bg-primary/5');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('border-primary','bg-primary/5'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('border-primary','bg-primary/5');handleUpload(e.dataTransfer.files);});
  fi.addEventListener('change',()=>handleUpload(fi.files));
}
async function handleUpload(files){
  if(!files.length||!currentUser)return;
  const prog=document.getElementById('upload-prog'),bar=document.getElementById('upload-bar'),lbl=document.getElementById('upload-label');
  prog.classList.remove('hidden');
  for(const file of files){
    lbl.textContent=`Uploading ${file.name}...`;
    let url='';
    try{
      if(storage){const sRef=storageRef(storage,`media/${currentUser.uid}/${Date.now()}_${file.name}`);await new Promise((res,rej)=>{const t=uploadBytesResumable(sRef,file);t.on('state_changed',s=>{bar.style.width=(s.bytesTransferred/s.totalBytes*100)+'%';},rej,async()=>{url=await getDownloadURL(t.snapshot.ref);res();});});}
      const type=file.type.startsWith('image/')?'image':file.type.startsWith('video/')?'video':'file';
      const ref2=await addDoc(collection(db,'media'),{name:file.name,type,url,size:file.size,uploaderId:currentUser.uid,uploaderName:currentUser.displayName||currentUser.email,createdAt:serverTimestamp()});
      allMedia.unshift({id:ref2.id,name:file.name,type,url,size:file.size,uploaderName:currentUser.displayName,uploaderId:currentUser.uid,createdAt:{toDate:()=>new Date()}});
    }catch(e){allMedia.unshift({id:'l'+Date.now(),name:file.name,type:file.type.startsWith('image/')?'image':file.type.startsWith('video/')?'video':'file',url:URL.createObjectURL(file),size:file.size,uploaderName:currentUser.displayName,uploaderId:currentUser.uid,createdAt:{toDate:()=>new Date()}});}
  }
  showToast(`${files.length} file${files.length>1?'s':''} uploaded! 🎉`,'info');
  setTimeout(()=>{prog.classList.add('hidden');bar.style.width='0%';},1200);
  updateStats();applyFilters();
}

// Events
document.querySelectorAll('.type-btn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.type-btn').forEach(x=>{x.className='type-btn px-4 py-1.5 rounded-full text-xs font-semibold text-on-surface-variant hover:bg-surface-container transition-colors';});b.className='type-btn px-4 py-1.5 rounded-full text-xs font-semibold bg-primary text-white';activeType=b.dataset.type;applyFilters();}));
document.getElementById('sort-sel').addEventListener('change',applyFilters);
document.querySelectorAll('.size-btn').forEach(b=>b.addEventListener('click',()=>{gallerySize=b.dataset.size;document.querySelectorAll('.size-btn').forEach(x=>{x.className='size-btn w-8 h-8 flex items-center justify-center rounded-lg border border-outline-variant text-sm text-on-surface-variant hover:bg-surface-container';});b.className='size-btn w-8 h-8 flex items-center justify-center rounded-lg border border-outline-variant text-sm bg-primary text-white';document.getElementById('gallery').className=gallerySize==='small'?'gallery small':gallerySize==='large'?'gallery large':'gallery';}));
</script>
</body>
</html>
