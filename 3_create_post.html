<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<title>CommunityHub — Create Post</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="tw-config.js"></script>
<link rel="stylesheet" href="style.css">
<style>
body{font-family:'Inter',sans-serif;background:#f9f9ff;}
.step-connector{flex:1;height:2px;background:#e0e2eb;margin-top:13px;}
.step-connector.done{background:#005ab4;}
[contenteditable]:empty:before{content:attr(data-placeholder);color:#717785;pointer-events:none;}
</style>
</head>
<body class="bg-background text-on-surface">
<header class="bg-white border-b border-slate-200 shadow-sm fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-6 h-16" id="app-header"></header>
<div class="flex pt-16 min-h-screen">
<aside class="bg-slate-50 border-r border-slate-200 fixed left-0 h-[calc(100vh-64px)] w-64 hidden lg:flex flex-col py-4 overflow-y-auto" id="app-sidebar"></aside>
<main class="flex-1 lg:ml-64 p-6 xl:p-8">
<div class="max-w-3xl mx-auto">

  <!-- Back + title -->
  <div class="flex items-center gap-4 mb-6 fade-up">
    <a href="2_community_home.html" class="flex items-center gap-1 text-sm text-on-surface-variant hover:text-on-surface transition-colors">
      <span class="material-symbols-outlined text-[18px]">arrow_back</span>Back
    </a>
    <div>
      <h1 class="text-xl font-bold text-on-surface">Create Discussion</h1>
      <p class="text-xs text-on-surface-variant mt-0.5">Share your thoughts with the community</p>
    </div>
  </div>

  <!-- Steps -->
  <div class="flex items-start mb-8 fade-up-2" id="steps-bar">
    <div class="flex flex-col items-center" id="s1">
      <div class="w-7 h-7 rounded-full bg-primary text-white text-xs font-bold flex items-center justify-center z-10">1</div>
      <div class="text-[10px] font-semibold text-primary mt-1.5">Content</div>
    </div>
    <div class="step-connector mt-3.5 mx-1" id="conn-1-2"></div>
    <div class="flex flex-col items-center" id="s2">
      <div class="w-7 h-7 rounded-full bg-surface-container text-on-surface-variant text-xs font-bold flex items-center justify-center z-10">2</div>
      <div class="text-[10px] font-semibold text-on-surface-variant mt-1.5">Category</div>
    </div>
    <div class="step-connector mt-3.5 mx-1" id="conn-2-3"></div>
    <div class="flex flex-col items-center" id="s3">
      <div class="w-7 h-7 rounded-full bg-surface-container text-on-surface-variant text-xs font-bold flex items-center justify-center z-10">3</div>
      <div class="text-[10px] font-semibold text-on-surface-variant mt-1.5">Preview</div>
    </div>
  </div>

  <!-- Page 1: Content -->
  <div id="page-1" class="fade-up-2">
    <div class="bg-white rounded-xl border border-outline-variant shadow-sm p-6 mb-4">
      <!-- Toolbar -->
      <div class="flex gap-1 flex-wrap p-2 bg-surface-container-low rounded-lg mb-4">
        <button onclick="fmt('bold')" class="w-8 h-8 rounded flex items-center justify-center text-sm font-bold text-on-surface-variant hover:bg-surface-container transition-colors"><b>B</b></button>
        <button onclick="fmt('italic')" class="w-8 h-8 rounded flex items-center justify-center text-sm font-bold text-on-surface-variant hover:bg-surface-container transition-colors"><i>I</i></button>
        <button onclick="fmt('underline')" class="w-8 h-8 rounded flex items-center justify-center text-sm font-bold text-on-surface-variant hover:bg-surface-container transition-colors"><u>U</u></button>
        <div class="w-px bg-outline-variant mx-1"></div>
        <button onclick="fmt('insertUnorderedList')" class="w-8 h-8 rounded flex items-center justify-center text-sm text-on-surface-variant hover:bg-surface-container transition-colors">•—</button>
        <button onclick="fmt('insertOrderedList')" class="w-8 h-8 rounded flex items-center justify-center text-sm text-on-surface-variant hover:bg-surface-container transition-colors">1.</button>
        <button onclick="fmt('formatBlock','BLOCKQUOTE')" class="w-8 h-8 rounded flex items-center justify-center text-sm text-on-surface-variant hover:bg-surface-container transition-colors">"</button>
        <button onclick="fmt('formatBlock','PRE')" class="w-8 h-8 rounded flex items-center justify-center text-xs text-on-surface-variant hover:bg-surface-container transition-colors">&lt;/&gt;</button>
      </div>
      <input id="post-title" type="text" placeholder="What's your discussion about?"
        class="w-full text-xl font-bold text-on-surface border-0 border-b-2 border-outline-variant pb-3 mb-4 bg-transparent focus:outline-none focus:border-primary transition-colors placeholder:text-outline/60"/>
      <div contenteditable="true" id="post-body" data-placeholder="Share your thoughts, ideas, or questions..."
        class="w-full min-h-[200px] text-sm text-on-surface leading-7 focus:outline-none border border-outline-variant rounded-lg p-4 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all"></div>
      <div class="border-t border-outline-variant mt-4 pt-4">
        <label class="text-xs font-semibold text-on-surface-variant mb-2 block">Tags <span class="font-normal">(up to 5, press Enter)</span></label>
        <div id="tag-container" onclick="document.getElementById('tag-input').focus()"
          class="flex flex-wrap gap-2 min-h-[42px] items-center p-2 border border-outline-variant rounded-lg cursor-text focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/20 transition-all">
          <input id="tag-input" placeholder="Add a tag..." class="border-none outline-none text-sm bg-transparent min-w-[100px]">
        </div>
      </div>
    </div>

    <!-- Attachment -->
    <div id="drop-zone" onclick="document.getElementById('file-inp').click()"
      class="border-2 border-dashed border-outline-variant rounded-xl p-8 text-center cursor-pointer hover:border-primary hover:bg-primary/5 transition-all mb-4">
      <span class="material-symbols-outlined text-4xl text-outline mb-2 block">attach_file</span>
      <p class="text-sm font-semibold text-on-surface">Attach images or files</p>
      <p class="text-xs text-on-surface-variant mt-1">Drag &amp; drop or click to browse</p>
      <input type="file" id="file-inp" multiple accept="image/*" class="hidden">
    </div>
    <div class="grid grid-cols-auto-fill gap-2" id="preview-grid" style="grid-template-columns:repeat(auto-fill,minmax(90px,1fr))"></div>
    <div class="flex justify-end mt-6">
      <button onclick="goStep(2)" class="bg-primary text-white px-6 py-2.5 rounded-lg text-sm font-semibold hover:brightness-110 active:scale-95 transition-all flex items-center gap-2">
        Next: Category <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
      </button>
    </div>
  </div>

  <!-- Page 2: Category -->
  <div id="page-2" class="hidden">
    <div class="bg-white rounded-xl border border-outline-variant shadow-sm p-6 mb-4">
      <h2 class="text-base font-semibold text-on-surface mb-4">Select a Category</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="cat-grid"></div>
    </div>
    <div class="flex justify-between mt-4">
      <button onclick="goStep(1)" class="border border-outline-variant text-on-surface px-5 py-2.5 rounded-lg text-sm font-semibold hover:bg-surface-container transition-colors flex items-center gap-2">
        <span class="material-symbols-outlined text-[18px]">arrow_back</span>Back
      </button>
      <button onclick="goStep(3)" class="bg-primary text-white px-6 py-2.5 rounded-lg text-sm font-semibold hover:brightness-110 active:scale-95 transition-all flex items-center gap-2">
        Preview <span class="material-symbols-outlined text-[18px]">preview</span>
      </button>
    </div>
  </div>

  <!-- Page 3: Preview & Publish -->
  <div id="page-3" class="hidden">
    <div class="bg-white rounded-xl border border-outline-variant shadow-sm p-6 mb-4" id="preview-card">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-sm font-bold text-on-primary-container" id="pv-avatar">U</div>
        <div>
          <div class="text-sm font-semibold text-on-surface" id="pv-author">You</div>
          <div class="text-xs text-on-surface-variant">Just now</div>
        </div>
      </div>
      <div class="flex flex-wrap gap-2 mb-3" id="pv-chips"></div>
      <h2 class="text-xl font-bold text-on-surface mb-3" id="pv-title"></h2>
      <div class="text-sm text-on-surface-variant leading-7" id="pv-body"></div>
      <div class="flex flex-wrap gap-2 mt-4" id="pv-tags"></div>
    </div>
    <div class="flex justify-between items-center mt-4 flex-wrap gap-3">
      <button onclick="goStep(2)" class="border border-outline-variant text-on-surface px-5 py-2.5 rounded-lg text-sm font-semibold hover:bg-surface-container transition-colors flex items-center gap-2">
        <span class="material-symbols-outlined text-[18px]">edit</span>Edit
      </button>
      <div class="flex gap-3">
        <button id="draft-btn" class="border border-outline-variant text-on-surface px-5 py-2.5 rounded-lg text-sm font-semibold hover:bg-surface-container transition-colors flex items-center gap-2">
          <span class="material-symbols-outlined text-[18px]">save</span>Save Draft
        </button>
        <button id="submit-btn" class="bg-primary text-white px-6 py-2.5 rounded-lg text-sm font-semibold hover:brightness-110 active:scale-95 transition-all flex items-center gap-2">
          <span class="material-symbols-outlined text-[18px]">send</span>Publish Post
        </button>
      </div>
    </div>
  </div>
</div>
</main>
</div>
<div class="mobile-bottom-nav fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 z-50 flex items-center justify-around h-16 px-2 md:hidden" id="mobile-nav"></div>

<script src="app.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app=initializeApp(FIREBASE_CONFIG),auth=getAuth(app),db=getFirestore(app);
let currentUser,tags=[],selectedCat='';
const CATS=[{icon:'lightbulb',name:'Ideas'},{icon:'help',name:'Questions'},{icon:'campaign',name:'Announcements'},{icon:'build',name:'Projects'},{icon:'celebration',name:'Events'},{icon:'work',name:'Jobs'},{icon:'menu_book',name:'Resources'},{icon:'forum',name:'General'}];

onAuthStateChanged(auth,u=>{if(!u){location.href='1_welcome.html';return;}currentUser=u;initLayout(u);buildCats();});
function buildCats(){document.getElementById('cat-grid').innerHTML=CATS.map(c=>`<div class="category-card flex flex-col items-center p-4 border-2 border-outline-variant rounded-xl cursor-pointer hover:border-primary hover:bg-primary/5 transition-all" onclick="selCat(this,'${c.name}')"><span class="material-symbols-outlined text-primary text-3xl mb-2">${c.icon}</span><span class="text-xs font-semibold text-on-surface">${c.name}</span></div>`).join('');}
window.selCat=(el,name)=>{document.querySelectorAll('.category-card').forEach(c=>c.classList.remove('border-primary','bg-primary/5'));el.classList.add('border-primary','bg-primary/5');selectedCat=name;};
window.fmt=(cmd,val)=>document.execCommand(cmd,false,val||undefined);
const tagInp=document.getElementById('tag-input');
tagInp.addEventListener('keydown',e=>{if((e.key==='Enter'||e.key===',')&&tagInp.value.trim()){e.preventDefault();addTag(tagInp.value.trim().replace(',',''));tagInp.value='';}if(e.key==='Backspace'&&!tagInp.value&&tags.length)removeTag(tags[tags.length-1]);});
function addTag(t){if(tags.includes(t)||tags.length>=5)return;tags.push(t);const p=document.createElement('span');p.className='inline-flex items-center gap-1 px-2.5 py-1 bg-secondary-container text-on-secondary-container rounded-full text-xs font-semibold';p.id='tp-'+t;p.innerHTML=`#${t} <span onclick="removeTag('${t}')" class="cursor-pointer opacity-60 hover:opacity-100 text-sm leading-none">×</span>`;document.getElementById('tag-container').insertBefore(p,tagInp);}
window.removeTag=n=>{tags=tags.filter(t=>t!==n);document.getElementById('tp-'+n)?.remove();};
const dz=document.getElementById('drop-zone'),fi=document.getElementById('file-inp');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('border-primary','bg-primary/5');});
dz.addEventListener('dragleave',()=>dz.classList.remove('border-primary','bg-primary/5'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('border-primary','bg-primary/5');handleFiles(e.dataTransfer.files);});
fi.addEventListener('change',()=>handleFiles(fi.files));
function handleFiles(files){const grid=document.getElementById('preview-grid');[...files].forEach(f=>{if(!f.type.startsWith('image/'))return;const r=new FileReader();r.onload=e=>{const d=document.createElement('div');d.className='relative aspect-square rounded-lg overflow-hidden border border-outline-variant';d.innerHTML=`<img src="${e.target.result}" class="w-full h-full object-cover"><button onclick="this.parentElement.remove()" class="absolute top-1 right-1 w-5 h-5 rounded-full bg-black/60 text-white text-xs flex items-center justify-center">×</button>`;grid.appendChild(d);};r.readAsDataURL(f);});}

window.goStep=step=>{
  if(step>1&&!document.getElementById('post-title').value.trim()){showToast('Please add a title first','error');return;}
  if(step===3)buildPreview();
  [1,2,3].forEach(s=>{
    document.getElementById('page-'+s).classList.toggle('hidden',s!==step);
    const circle=document.getElementById('s'+s).querySelector('div');
    const label=document.getElementById('s'+s).querySelector('div:last-child');
    if(s<step){circle.className='w-7 h-7 rounded-full bg-green-500 text-white text-xs font-bold flex items-center justify-center z-10';circle.textContent='✓';if(s<2)document.getElementById('conn-'+s+'-'+(s+1)).classList.add('done');}
    else if(s===step){circle.className='w-7 h-7 rounded-full bg-primary text-white text-xs font-bold flex items-center justify-center z-10';circle.textContent=s;label.className='text-[10px] font-semibold text-primary mt-1.5';}
    else{circle.className='w-7 h-7 rounded-full bg-surface-container text-on-surface-variant text-xs font-bold flex items-center justify-center z-10';circle.textContent=s;label.className='text-[10px] font-semibold text-on-surface-variant mt-1.5';}
  });
};
function buildPreview(){
  document.getElementById('pv-title').textContent=document.getElementById('post-title').value;
  document.getElementById('pv-body').innerHTML=document.getElementById('post-body').innerHTML;
  document.getElementById('pv-author').textContent=currentUser?.displayName||'You';
  document.getElementById('pv-avatar').textContent=getInitials(currentUser?.displayName||'U');
  document.getElementById('pv-chips').innerHTML=(selectedCat?`<span class="px-2.5 py-1 bg-primary-container text-on-primary-container rounded-full text-xs font-semibold">${selectedCat}</span>`:'')+tags.map(t=>`<span class="px-2.5 py-1 bg-secondary-container text-on-secondary-container rounded-full text-xs font-semibold">#${t}</span>`).join('');
}
document.getElementById('submit-btn').addEventListener('click',async()=>{
  const title=document.getElementById('post-title').value.trim(),body=document.getElementById('post-body').innerText.trim();
  if(!title){showToast('Title required','error');return;}
  const btn=document.getElementById('submit-btn');btn.disabled=true;btn.innerHTML='<div class="spinner"></div> Publishing...';
  try{await addDoc(collection(db,'posts'),{title,body,tags,category:selectedCat,authorId:currentUser.uid,authorName:currentUser.displayName||currentUser.email,authorPhotoURL:currentUser.photoURL||'',likeCount:0,replyCount:0,createdAt:serverTimestamp(),updatedAt:serverTimestamp()});showToast('Post published! 🎉','info');setTimeout(()=>location.href='4_discussion_thread.html',1000);}
  catch(e){showToast('Error: '+e.message,'error');btn.disabled=false;btn.innerHTML='<span class="material-symbols-outlined text-[18px]">send</span>Publish Post';}
});
document.getElementById('draft-btn').addEventListener('click',()=>showToast('Draft saved','info'));
</script>
</body>
</html>
