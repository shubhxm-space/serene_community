<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<title>CommunityHub — Discussions</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="tw-config.js"></script>
<link rel="stylesheet" href="style.css">
<style>body{font-family:'Inter',sans-serif;background:#f9f9ff;}</style>
</head>
<body class="bg-background text-on-surface">
<header class="bg-white border-b border-slate-200 shadow-sm fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-6 h-16" id="app-header"></header>
<div class="flex pt-16 min-h-screen">
<aside class="bg-slate-50 border-r border-slate-200 fixed left-0 h-[calc(100vh-64px)] w-64 hidden lg:flex flex-col py-4 overflow-y-auto" id="app-sidebar"></aside>
<main class="flex-1 lg:ml-64 p-6 xl:p-8">
<div class="max-w-4xl mx-auto">

  <!-- Back & header -->
  <div class="flex items-center gap-4 mb-6 fade-up">
    <a href="2_community_home.html" class="flex items-center gap-1 text-sm text-on-surface-variant hover:text-on-surface">
      <span class="material-symbols-outlined text-[18px]">arrow_back</span>Back
    </a>
    <div>
      <h1 class="text-xl font-bold text-on-surface" id="page-title">Discussion Thread</h1>
      <p class="text-xs text-on-surface-variant mt-0.5" id="page-cat">Community discussion</p>
    </div>
  </div>

  <!-- Post hero -->
  <div class="bg-white rounded-xl border border-outline-variant shadow-sm p-6 mb-6 fade-up-2" id="post-hero">
    <div class="skeleton h-7 w-2/3 mb-4 rounded"></div>
    <div class="skeleton h-5 w-1/3 mb-6 rounded"></div>
    <div class="skeleton h-24 w-full rounded"></div>
  </div>

  <!-- Sort + count bar -->
  <div class="flex items-center gap-3 mb-4 flex-wrap fade-up-2">
    <span class="text-sm font-semibold text-on-surface-variant">Sort by:</span>
    <div class="flex gap-1">
      <button class="sort-btn px-3 py-1.5 rounded-full text-xs font-semibold bg-primary text-white" data-sort="top">🔥 Top</button>
      <button class="sort-btn px-3 py-1.5 rounded-full text-xs font-semibold text-on-surface-variant hover:bg-surface-container border border-outline-variant transition-colors" data-sort="newest">New</button>
      <button class="sort-btn px-3 py-1.5 rounded-full text-xs font-semibold text-on-surface-variant hover:bg-surface-container border border-outline-variant transition-colors" data-sort="oldest">Old</button>
    </div>
    <span class="ml-auto text-xs text-on-surface-variant" id="reply-count-label"></span>
    <a href="3_create_post.html" class="bg-primary text-white px-4 py-2 rounded-lg text-xs font-semibold hover:brightness-110 transition-all flex items-center gap-1.5">
      <span class="material-symbols-outlined text-[16px]">add</span>New Post
    </a>
  </div>

  <!-- Replies -->
  <div id="replies-list" class="space-y-3 mb-6">
    <div class="skeleton h-24 w-full rounded-xl"></div>
    <div class="skeleton h-20 w-full rounded-xl"></div>
  </div>

  <!-- Reply composer -->
  <div class="bg-white rounded-xl border border-outline-variant shadow-sm p-6 fade-up-3">
    <div class="flex items-center gap-3 mb-4">
      <div class="w-9 h-9 rounded-full bg-primary-container flex items-center justify-center text-xs font-bold text-on-primary-container" id="composer-avatar">U</div>
      <div>
        <div class="text-sm font-semibold text-on-surface" id="composer-name">You</div>
        <div class="text-xs text-on-surface-variant">Add your reply</div>
      </div>
    </div>
    <textarea id="reply-input" rows="3" placeholder="Share your thoughts on this discussion..."
      class="w-full resize-none text-sm text-on-surface border border-outline-variant rounded-lg p-3 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline/60"></textarea>
    <div class="flex justify-between items-center mt-3">
      <div class="flex gap-2">
        <button onclick="appendEmoji('😊')" class="text-on-surface-variant hover:text-on-surface text-lg transition-colors">😊</button>
        <button onclick="appendEmoji('👍')" class="text-on-surface-variant hover:text-on-surface text-lg transition-colors">👍</button>
        <button onclick="appendEmoji('🔥')" class="text-on-surface-variant hover:text-on-surface text-lg transition-colors">🔥</button>
      </div>
      <button id="reply-btn" class="bg-primary text-white px-5 py-2 rounded-lg text-sm font-semibold hover:brightness-110 active:scale-95 transition-all flex items-center gap-2">
        <span class="material-symbols-outlined text-[16px]">send</span>Post Reply
      </button>
    </div>
  </div>

</div>
</main>
</div>
<div class="mobile-bottom-nav fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 z-50 flex items-center justify-around h-16 px-2 md:hidden" id="mobile-nav"></div>

<script src="app.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, query, orderBy, limit, onSnapshot, getDocs, addDoc, updateDoc, increment, arrayUnion, arrayRemove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app=initializeApp(FIREBASE_CONFIG),auth=getAuth(app),db=getFirestore(app);
let currentUser,postId=new URLSearchParams(location.search).get('id'),sortMode='top',unsubReplies=null;

onAuthStateChanged(auth,async u=>{
  if(!u){location.href='1_welcome.html';return;}
  currentUser=u;initLayout(u);
  document.getElementById('composer-avatar').textContent=getInitials(u.displayName||'U');
  document.getElementById('composer-name').textContent=u.displayName||'You';
  if(postId)await loadPost(postId); else await loadLatest();
  loadReplies();
});

async function loadPost(id){
  try{const snap=await getDoc(doc(db,'posts',id));if(snap.exists())renderPost(snap.data(),id);else await loadLatest();}
  catch(e){await loadLatest();}
}
async function loadLatest(){
  try{
    const snap=await getDocs(query(collection(db,'posts'),orderBy('createdAt','desc'),limit(1)));
    if(snap.empty){document.getElementById('post-hero').innerHTML='<p class="text-sm text-on-surface-variant text-center py-8">No discussions yet. <a href="3_create_post.html" class="text-primary underline">Start one!</a></p>';return;}
    snap.forEach(d=>{postId=d.id;renderPost(d.data(),d.id);});
  }catch(e){document.getElementById('post-hero').innerHTML='<p class="text-sm text-on-surface-variant text-center py-8">Could not load post.</p>';}
}

function renderPost(p,id){
  const liked=p.likedBy?.includes(currentUser?.uid);
  document.getElementById('page-title').textContent='Discussion';
  document.getElementById('page-cat').textContent=p.category||'Community discussion';
  document.getElementById('post-hero').innerHTML=`
    <div class="flex flex-wrap gap-2 mb-4">
      ${p.category?`<span class="px-2.5 py-1 bg-primary-container text-on-primary-container rounded-full text-xs font-semibold">${escHtml(p.category)}</span>`:''}
      ${(p.tags||[]).map(t=>`<span class="px-2.5 py-1 bg-secondary-container text-on-secondary-container rounded-full text-xs font-semibold">#${escHtml(t)}</span>`).join('')}
    </div>
    <h2 class="text-xl font-bold text-on-surface mb-4">${escHtml(p.title||'Untitled')}</h2>
    <div class="flex items-center gap-3 mb-5">
      <div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-sm font-bold text-on-primary-container">${getInitials(p.authorName||'U')}</div>
      <div>
        <div class="text-sm font-semibold text-on-surface">${escHtml(p.authorName||'Community Member')}</div>
        <div class="text-xs text-on-surface-variant">${formatDate(p.createdAt)} · ${timeAgo(p.createdAt)}</div>
      </div>
    </div>
    <div class="text-sm text-on-surface leading-7 mb-5">${escHtml(p.body||'').replace(/\n/g,'<br>')}</div>
    <div class="border-t border-outline-variant pt-4 flex items-center gap-3 flex-wrap">
      <button onclick="toggleLike('${id}',${!!liked})" id="like-btn"
        class="flex items-center gap-1.5 px-4 py-2 rounded-full text-sm font-semibold transition-all border ${liked?'bg-primary-container text-primary border-primary/30':'text-on-surface-variant border-outline-variant hover:bg-surface-container'}">
        <span class="material-symbols-outlined text-[18px]" style="${liked?"font-variation-settings:'FILL' 1":""}">thumb_up</span>
        <span id="like-count">${p.likeCount||0}</span>
      </button>
      <button class="flex items-center gap-1.5 px-4 py-2 rounded-full text-sm font-semibold text-on-surface-variant border border-outline-variant hover:bg-surface-container transition-colors">
        <span class="material-symbols-outlined text-[18px]">forum</span>${p.replyCount||0} Replies
      </button>
      <button onclick="navigator.share?navigator.share({title:'${escHtml(p.title||'')}',url:location.href}):copyLink()" class="flex items-center gap-1.5 px-4 py-2 rounded-full text-sm font-semibold text-on-surface-variant border border-outline-variant hover:bg-surface-container transition-colors">
        <span class="material-symbols-outlined text-[18px]">share</span>Share
      </button>
    </div>`;
}
window.toggleLike=async(id,wasLiked)=>{
  if(!currentUser)return;
  await updateDoc(doc(db,'posts',id),{likeCount:increment(wasLiked?-1:1),likedBy:wasLiked?arrayRemove(currentUser.uid):arrayUnion(currentUser.uid)});
  showToast(wasLiked?'Like removed':'Liked! 👍','info');
};
window.copyLink=()=>{navigator.clipboard.writeText(location.href);showToast('Link copied!','info');};

function loadReplies(){
  if(!postId){document.getElementById('replies-list').innerHTML='';return;}
  if(unsubReplies)unsubReplies();
  const q=query(collection(db,'posts',postId,'replies'),orderBy('createdAt','asc'));
  unsubReplies=onSnapshot(q,snap=>{
    const list=document.getElementById('replies-list');
    const label=document.getElementById('reply-count-label');
    if(label)label.textContent=`${snap.size} repl${snap.size===1?'y':'ies'}`;
    if(snap.empty){list.innerHTML='<p class="text-sm text-on-surface-variant text-center py-10">No replies yet — be the first to respond! 👇</p>';return;}
    let replies=[];snap.forEach(d=>replies.push({id:d.id,...d.data()}));
    if(sortMode==='top')replies.sort((a,b)=>(b.likeCount||0)-(a.likeCount||0));
    else if(sortMode==='newest')replies.sort((a,b)=>b.createdAt?.seconds-a.createdAt?.seconds);
    const colors=['bg-secondary-fixed text-on-secondary-fixed','bg-tertiary-fixed text-on-tertiary-fixed','bg-primary-fixed text-on-primary-fixed'];
    list.innerHTML=replies.map((r,i)=>`
      <div class="bg-white rounded-xl border border-outline-variant shadow-sm p-5 fade-up hover:border-primary/20 transition-colors">
        <div class="flex items-center gap-3 mb-3">
          <div class="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center text-xs font-bold ${colors[i%3]}">${getInitials(r.authorName||'U')}</div>
          <div class="flex-1">
            <span class="text-sm font-semibold text-on-surface">${escHtml(r.authorName||'Member')}</span>
          </div>
          <span class="text-xs text-outline">${timeAgo(r.createdAt)}</span>
        </div>
        <p class="text-sm text-on-surface leading-7">${escHtml(r.body||'').replace(/\n/g,'<br>')}</p>
        <div class="flex gap-3 mt-3">
          <button onclick="likeReply('${r.id}')" class="flex items-center gap-1 text-xs text-on-surface-variant hover:text-primary transition-colors">
            <span class="material-symbols-outlined text-[14px]">thumb_up</span>${r.likeCount||0}
          </button>
          <button class="text-xs text-on-surface-variant hover:text-primary transition-colors">↩ Reply</button>
          ${r.authorId===currentUser?.uid?`<button onclick="deleteReply('${r.id}')" class="text-xs text-red-400 hover:text-red-600 transition-colors ml-auto">Delete</button>`:''}
        </div>
      </div>`).join('');
  },()=>{document.getElementById('replies-list').innerHTML='<p class="text-sm text-on-surface-variant text-center py-8">Could not load replies.</p>';});
}
window.likeReply=async rid=>{if(!postId||!currentUser)return;await updateDoc(doc(db,'posts',postId,'replies',rid),{likeCount:increment(1)});};
window.deleteReply=async rid=>{
  const{deleteDoc:dd}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  if(!postId)return;await dd(doc(db,'posts',postId,'replies',rid));showToast('Reply deleted','info');
};

// Sort
document.querySelectorAll('.sort-btn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.sort-btn').forEach(x=>{x.className='sort-btn px-3 py-1.5 rounded-full text-xs font-semibold text-on-surface-variant hover:bg-surface-container border border-outline-variant transition-colors';});
  b.className='sort-btn px-3 py-1.5 rounded-full text-xs font-semibold bg-primary text-white';
  sortMode=b.dataset.sort;loadReplies();
}));

// Post reply
document.getElementById('reply-btn').addEventListener('click',async()=>{
  if(!postId){showToast('No post selected','error');return;}
  const body=document.getElementById('reply-input').value.trim();
  if(!body){showToast('Write something first','error');return;}
  const btn=document.getElementById('reply-btn');btn.disabled=true;btn.innerHTML='<div class="spinner"></div>';
  try{
    await addDoc(collection(db,'posts',postId,'replies'),{body,authorId:currentUser.uid,authorName:currentUser.displayName||currentUser.email,authorPhotoURL:currentUser.photoURL||'',likeCount:0,createdAt:serverTimestamp()});
    await updateDoc(doc(db,'posts',postId),{replyCount:increment(1)});
    document.getElementById('reply-input').value='';showToast('Reply posted! 🎉','info');
  }catch(e){showToast('Error: '+e.message,'error');}
  btn.disabled=false;btn.innerHTML='<span class="material-symbols-outlined text-[16px]">send</span>Post Reply';
});
window.appendEmoji=e=>{const inp=document.getElementById('reply-input');inp.value+=e;inp.focus();};
</script>
</body>
</html>
