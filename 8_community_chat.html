<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/><meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<title>CommunityHub — Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="tw-config.js"></script>
<link rel="stylesheet" href="style.css">
<style>
body{font-family:'Inter',sans-serif;background:#f9f9ff;}
.chat-shell{position:fixed;top:64px;left:256px;right:0;bottom:0;display:flex;overflow:hidden;}
@media(max-width:1024px){.chat-shell{left:0;}}
/* On mobile, leave room for the bottom nav (64px) so the composer isn't hidden */
@media(max-width:768px){.chat-shell{bottom:64px;}}
.msg-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:4px;}
.msg-area::-webkit-scrollbar{width:5px;}
.msg-area::-webkit-scrollbar-thumb{background:#e0e2eb;border-radius:3px;}
.bubble-in{background:#fff;border:1px solid #e0e2eb;border-radius:16px 16px 16px 4px;padding:10px 14px;font-size:14px;line-height:1.6;max-width:68%;}
.bubble-out{background:#005ab4;color:#fff;border-radius:16px 16px 4px 16px;padding:10px 14px;font-size:14px;line-height:1.6;max-width:68%;}
.typing-dot{width:7px;height:7px;border-radius:50%;background:#717785;animation:typingBounce 1.2s infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}
</style>
</head>
<body class="bg-background text-on-surface">
<header class="bg-white border-b border-slate-200 shadow-sm fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-6 h-16" id="app-header"></header>
<nav class="bg-slate-50 border-r border-slate-200 fixed left-0 top-16 bottom-0 w-64 hidden lg:flex flex-col py-4 overflow-y-auto z-40" id="app-sidebar"></nav>

<div class="chat-shell">
  <!-- Channel list -->
  <div class="w-60 flex-shrink-0 bg-slate-50 border-r border-slate-200 flex flex-col hidden md:flex">
    <div class="px-4 py-4 border-b border-slate-200">
      <h2 class="font-bold text-slate-900 text-base">CommunityHub Chat</h2>
      <div class="flex items-center gap-2 mt-3 bg-white border border-outline-variant rounded-full px-3 py-1.5">
        <span class="material-symbols-outlined text-outline text-[16px]">search</span>
        <input type="text" placeholder="Find channels..." class="text-xs flex-1 border-none outline-none bg-transparent">
      </div>
    </div>
    <p class="px-4 pt-3 pb-1 text-[10px] font-bold uppercase tracking-widest text-slate-400">Channels</p>
    <div class="overflow-y-auto px-2" id="channel-list"></div>
    <div class="flex items-center justify-between px-4 pt-3 pb-1">
      <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Direct Messages</p>
      <button id="new-dm-btn" title="New Message" class="w-5 h-5 flex items-center justify-center rounded text-slate-400 hover:text-primary hover:bg-slate-200 transition-colors">
        <span class="material-symbols-outlined text-[16px]">edit_square</span>
      </button>
    </div>
    <div class="flex-1 overflow-y-auto px-2" id="dm-list"><p class="text-xs text-slate-400 px-2 py-2">No conversations yet</p></div>
  </div>

  <!-- Main chat -->
  <div class="flex-1 flex flex-col bg-white min-w-0">
    <!-- Top bar -->
    <div class="flex items-center justify-between px-5 h-14 border-b border-slate-200 flex-shrink-0 bg-white">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-primary-container flex items-center justify-center" id="ch-icon">
          <span class="material-symbols-outlined text-on-primary-container text-[18px]">forum</span>
        </div>
        <div>
          <div class="text-sm font-bold text-slate-900" id="ch-name">general</div>
          <div class="text-xs text-slate-400" id="ch-desc">Community general discussion</div>
        </div>
      </div>
      <div class="flex gap-1">
        <button class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-100 transition-colors"><span class="material-symbols-outlined text-slate-400 text-[18px]">search</span></button>
        <button class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-100 transition-colors"><span class="material-symbols-outlined text-slate-400 text-[18px]">push_pin</span></button>
        <button class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-100 transition-colors"><span class="material-symbols-outlined text-slate-400 text-[18px]">group</span></button>
      </div>
    </div>

    <!-- Messages -->
    <div class="msg-area" id="msg-area"></div>

    <!-- Typing indicator -->
    <div class="px-5 py-2 h-8 flex-shrink-0" id="typing-indicator"></div>

    <!-- Composer -->
    <div class="px-4 py-3 border-t border-slate-200 flex-shrink-0 bg-white">
      <div class="flex items-end gap-3 bg-surface-container-low border border-outline-variant rounded-xl px-4 py-2 focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/20 transition-all">
        <div class="flex gap-1">
          <button id="emoji-toggle" class="w-8 h-8 flex items-center justify-center rounded-lg text-on-surface-variant hover:bg-surface-container text-lg transition-colors">😊</button>
          <button class="w-8 h-8 flex items-center justify-center rounded-lg text-on-surface-variant hover:bg-surface-container transition-colors"><span class="material-symbols-outlined text-[18px]">attach_file</span></button>
        </div>
        <textarea id="msg-input" rows="1" placeholder="Message #general..."
          class="flex-1 text-sm bg-transparent border-none outline-none resize-none text-on-surface max-h-28 min-h-[22px]"></textarea>
        <button id="send-btn" class="w-9 h-9 rounded-full bg-primary flex items-center justify-center shadow-sm hover:brightness-110 active:scale-95 transition-all flex-shrink-0 opacity-50" disabled>
          <span class="material-symbols-outlined text-white text-[18px]">send</span>
        </button>
      </div>
      <!-- Emoji panel -->
      <div id="emoji-panel" class="hidden mt-2 p-3 bg-white border border-outline-variant rounded-xl shadow-md">
        <div class="grid grid-cols-8 gap-1" id="emoji-grid"></div>
      </div>
    </div>
  </div>

  <!-- Online panel -->
  <div class="w-52 flex-shrink-0 bg-slate-50 border-l border-slate-200 flex flex-col p-3 hidden xl:flex">
    <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-3">Online — <span id="panel-count">0</span></p>
    <div id="panel-members" class="flex flex-col gap-1 overflow-y-auto"></div>
  </div>
</div>

<!-- Member Picker Modal -->
<div id="dm-modal" class="hidden fixed inset-0 z-[200] flex items-center justify-center bg-black/40 backdrop-blur-sm">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-4 overflow-hidden">
    <div class="flex items-center justify-between px-5 py-4 border-b border-slate-100">
      <h3 class="font-bold text-slate-900">New Direct Message</h3>
      <button onclick="document.getElementById('dm-modal').classList.add('hidden')" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-100 text-slate-400"><span class="material-symbols-outlined text-[18px]">close</span></button>
    </div>
    <div class="px-4 py-3 border-b border-slate-100">
      <div class="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2">
        <span class="material-symbols-outlined text-slate-400 text-[18px]">search</span>
        <input id="dm-search" type="text" placeholder="Search members..." class="flex-1 text-sm bg-transparent border-none outline-none">
      </div>
    </div>
    <div id="dm-member-list" class="max-h-64 overflow-y-auto divide-y divide-slate-50"></div>
  </div>
</div>

<script src="app.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, query, orderBy, limit, onSnapshot, addDoc, serverTimestamp, getDocs, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app=initializeApp(FIREBASE_CONFIG),auth=getAuth(app),db=getFirestore(app);
let currentUser,activeChannel='general',unsubMsg=null,isDM=false,activeDMUser=null,allCommunityMembers=[];

const CHANNELS=[
  {id:'general',icon:'forum',name:'general',desc:'Community general discussion'},
  {id:'announcements',icon:'campaign',name:'announcements',desc:'Official announcements',badge:2},
  {id:'introductions',icon:'waving_hand',name:'introductions',desc:'Say hello!'},
  {id:'ideas',icon:'lightbulb',name:'ideas',desc:'Share your ideas',badge:1},
  {id:'off-topic',icon:'sports_esports',name:'off-topic',desc:'Casual chats'},
  {id:'resources',icon:'menu_book',name:'resources',desc:'Links & tools'},
];
const EMOJIS=['😀','😂','❤️','👍','🔥','🎉','🙌','💡','✅','💯','🚀','⭐','😊','🤔','👀','💬','😎','🤝','💪','🌟','✨','🙏'];

onAuthStateChanged(auth,async u=>{
  if(!u){location.href='1_welcome.html';return;}
  currentUser=u;initLayout(u);
  buildChannels();buildEmojiGrid();
  await loadAllMembers();
  loadDMList();
  loadOnlineMembers();
  const withId=new URLSearchParams(location.search).get('with');
  if(withId){
    // Find member and open DM
    const snap=await getDoc(doc(db,'users',withId));
    const udata=snap.exists()?snap.data():{displayName:'Member',uid:withId};
    openDM(withId,udata.displayName||'Member');
  } else {
    switchChannel('general');
  }
});

function buildChannels(){
  document.getElementById('channel-list').innerHTML=CHANNELS.map(c=>`
    <div onclick="switchChannel('${c.id}')" id="chbtn-${c.id}"
      class="flex items-center gap-2 px-2 py-2 rounded-lg cursor-pointer transition-colors mb-0.5 ${c.id===activeChannel?'bg-blue-50 text-blue-700 font-semibold':'text-slate-600 hover:bg-slate-100'}">
      <span class="material-symbols-outlined text-[18px]">${c.icon}</span>
      <span class="text-sm flex-1">${c.name}</span>
      ${c.badge?`<span class="bg-primary text-white text-[10px] font-bold rounded-full min-w-[16px] h-4 flex items-center justify-center px-1">${c.badge}</span>`:''}
    </div>`).join('');
}

window.switchChannel=ch=>{
  isDM=false;activeDMUser=null;
  activeChannel=ch;
  // Clear all active states
  document.querySelectorAll('[id^="chbtn-"],[id^="dmbtn-"]').forEach(el=>{
    el.classList.remove('bg-blue-50','text-blue-700','font-semibold');
    el.classList.add('text-slate-600');
  });
  const btn=document.getElementById('chbtn-'+ch);
  if(btn){btn.classList.add('bg-blue-50','text-blue-700','font-semibold');btn.classList.remove('text-slate-600');}
  const info=CHANNELS.find(c=>c.id===ch)||{name:ch,desc:'Channel',icon:'forum'};
  // Update header
  document.getElementById('ch-icon').innerHTML=`<span class="material-symbols-outlined text-on-primary-container text-[18px]">${info.icon||'forum'}</span>`;
  document.getElementById('ch-icon').className='w-8 h-8 rounded-lg bg-primary-container flex items-center justify-center';
  document.getElementById('ch-name').textContent=info.name;
  document.getElementById('ch-desc').textContent=info.desc;
  document.getElementById('msg-input').placeholder=`Message #${info.name}...`;
  if(unsubMsg)unsubMsg();
  document.getElementById('msg-area').innerHTML='';
  appendDateDivider('Today');
  loadMessages(ch);
};

function getDmId(uid1,uid2){return [uid1,uid2].sort().join('_');}

window.openDM=async(peerId,peerName)=>{
  isDM=true;
  activeDMUser={id:peerId,name:peerName};
  const dmId=getDmId(currentUser.uid,peerId);
  activeChannel=dmId;
  // Clear active states
  document.querySelectorAll('[id^="chbtn-"],[id^="dmbtn-"]').forEach(el=>{
    el.classList.remove('bg-blue-50','text-blue-700','font-semibold');
    el.classList.add('text-slate-600');
  });
  const btn=document.getElementById('dmbtn-'+peerId);
  if(btn){btn.classList.add('bg-blue-50','text-blue-700','font-semibold');btn.classList.remove('text-slate-600');}
  // Update header for DM
  const initials=getInitials(peerName);
  const colors=['bg-secondary-fixed','bg-primary-fixed','bg-tertiary-fixed'];
  const col=colors[peerName.charCodeAt(0)%3];
  document.getElementById('ch-icon').innerHTML=`<span class="text-xs font-bold">${initials}</span>`;
  document.getElementById('ch-icon').className=`w-8 h-8 rounded-full flex items-center justify-center ${col} text-on-primary-fixed`;
  document.getElementById('ch-name').textContent=peerName;
  document.getElementById('ch-desc').textContent='Direct message';
  document.getElementById('msg-input').placeholder=`Message ${peerName}...`;
  if(unsubMsg)unsubMsg();
  document.getElementById('msg-area').innerHTML='';
  appendDateDivider('Today');
  // Ensure DM thread doc exists
  try{
    await setDoc(doc(db,'dms',dmId),{participants:[currentUser.uid,peerId],updatedAt:serverTimestamp()},{merge:true});
  }catch(_){}
  // Load DM messages
  const q=query(collection(db,'dms',dmId,'messages'),orderBy('createdAt','asc'),limit(80));
  unsubMsg=onSnapshot(q,snap=>{
    snap.docChanges().forEach(change=>{if(change.type==='added')appendMsg(change.doc.data(),change.doc.id);});
    scrollBottom();
  },()=>{});
  // Close modal if open
  document.getElementById('dm-modal').classList.add('hidden');
  // Refresh DM list to show this conversation
  loadDMList();
};

async function loadAllMembers(){
  try{
    const snap=await getDocs(collection(db,'users'));
    allCommunityMembers=[];
    snap.forEach(d=>{if(d.id!==currentUser.uid)allCommunityMembers.push({id:d.id,...d.data()});});
  }catch(_){allCommunityMembers=[];}
}

async function loadDMList(){
  const list=document.getElementById('dm-list');
  try{
    // Find all DM threads where current user is participant
    const snap=await getDocs(query(collection(db,'dms'),orderBy('updatedAt','desc'),limit(20)));
    const myDMs=[];
    snap.forEach(d=>{
      const data=d.data();
      if(data.participants&&data.participants.includes(currentUser.uid)){
        const peerId=data.participants.find(id=>id!==currentUser.uid);
        myDMs.push({dmId:d.id,peerId,...data});
      }
    });
    if(!myDMs.length){list.innerHTML='<p class="text-xs text-slate-400 px-2 py-2">No conversations yet</p>';return;}
    // Fetch peer names
    const peerNames={};
    await Promise.all(myDMs.map(async dm=>{
      try{const u=await getDoc(doc(db,'users',dm.peerId));peerNames[dm.peerId]=u.exists()?u.data().displayName||'Member':'Member';}catch(_){peerNames[dm.peerId]='Member';}
    }));
    const colors=['bg-secondary-fixed text-on-secondary-fixed','bg-primary-fixed text-on-primary-fixed','bg-tertiary-fixed text-on-tertiary-fixed'];
    list.innerHTML=myDMs.map(dm=>{
      const name=peerNames[dm.peerId]||'Member';
      const initials=getInitials(name);
      const col=colors[name.charCodeAt(0)%3];
      const isActive=activeChannel===dm.dmId;
      return `<div id="dmbtn-${dm.peerId}" onclick="openDM('${dm.peerId}','${name.replace(/'/g,"\\'")}')"
        class="flex items-center gap-2 px-2 py-2 rounded-lg cursor-pointer transition-colors mb-0.5 ${isActive?'bg-blue-50 text-blue-700 font-semibold':'text-slate-600 hover:bg-slate-100'}">
        <div class="w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold flex-shrink-0 ${col}">${initials}</div>
        <span class="text-sm flex-1 truncate">${name}</span>
        ${dm.unread?`<span class="w-2 h-2 rounded-full bg-primary flex-shrink-0"></span>`:''}
      </div>`;
    }).join('');
  }catch(e){
    list.innerHTML='<p class="text-xs text-slate-400 px-2 py-2">No conversations yet</p>';
  }
}

function appendDateDivider(label){
  const div=document.createElement('div');
  div.className='flex items-center gap-3 my-3';
  div.innerHTML=`<div class="h-px flex-1 bg-slate-100"></div><span class="text-xs text-slate-400 font-semibold">${label}</span><div class="h-px flex-1 bg-slate-100"></div>`;
  document.getElementById('msg-area').appendChild(div);
}

function loadMessages(ch){
  const q=query(collection(db,'channels',ch,'messages'),orderBy('createdAt','asc'),limit(50));
  unsubMsg=onSnapshot(q,snap=>{
    if(snap.empty&&ch==='general')renderDemoMessages();
    snap.docChanges().forEach(change=>{if(change.type==='added')appendMsg(change.doc.data(),change.doc.id);});
    scrollBottom();
  },()=>{if(ch==='general')renderDemoMessages();});
}

function renderDemoMessages(){
  const demos=[
    {authorName:'Sarah Jenkins',body:'Hey everyone! 👋 Great to be here!',authorId:'d1'},
    {authorName:'Alex Thompson',body:'Welcome! This community is amazing 🔥',authorId:'d2'},
    {authorName:'Marcus Williams',body:'Does anyone have tips for async team collaboration?',authorId:'d3'},
    {authorName:'Sarah Jenkins',body:'Check out the #resources channel, lots of great links there! 💡',authorId:'d1'},
  ];
  demos.forEach((m,i)=>appendMsg(m,'demo'+i));
  scrollBottom();
}

const BG=['bg-secondary-fixed text-on-secondary-fixed','bg-primary-fixed text-on-primary-fixed','bg-tertiary-fixed text-on-tertiary-fixed'];
function appendMsg(msg,id){
  const area=document.getElementById('msg-area');
  if(document.getElementById('msg-'+id))return;
  const isSelf=msg.authorId===currentUser?.uid;
  const initials=getInitials(msg.authorName||'U');
  const colorClass=BG[(msg.authorName||'U').charCodeAt(0)%3];
  const el=document.createElement('div');
  el.id='msg-'+id;
  el.className=`flex gap-3 mb-4 ${isSelf?'flex-row-reverse':''}`;
  el.innerHTML=`
    <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0 self-end ${colorClass}">${initials}</div>
    <div class="flex flex-col ${isSelf?'items-end':''}">
      ${!isSelf?`<span class="text-xs font-semibold text-on-surface-variant mb-1 px-1">${msg.authorName||'Member'}</span>`:''}
      <div class="${isSelf?'bubble-out':'bubble-in'}">${escHtml(msg.body||'')}</div>
      <span class="text-[10px] text-outline mt-1 px-1">${msg.createdAt?timeAgo(msg.createdAt):'just now'}</span>
    </div>`;
  area.appendChild(el);
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function scrollBottom(){const a=document.getElementById('msg-area');a.scrollTop=a.scrollHeight;}

// Composer
const inp=document.getElementById('msg-input'),sendBtn=document.getElementById('send-btn');
inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,112)+'px';sendBtn.disabled=!inp.value.trim();sendBtn.classList.toggle('opacity-50',!inp.value.trim());});
inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
sendBtn.addEventListener('click',sendMessage);

async function sendMessage(){
  const body=inp.value.trim();if(!body||!currentUser)return;
  inp.value='';inp.style.height='auto';sendBtn.disabled=true;sendBtn.classList.add('opacity-50');
  try{
    if(isDM&&activeDMUser){
      // Send to DM collection
      const dmId=getDmId(currentUser.uid,activeDMUser.id);
      await addDoc(collection(db,'dms',dmId,'messages'),{body,authorId:currentUser.uid,authorName:currentUser.displayName||currentUser.email,createdAt:serverTimestamp()});
      // Update thread metadata
      await updateDoc(doc(db,'dms',dmId),{lastMessage:body,lastMessageAt:serverTimestamp(),updatedAt:serverTimestamp()});
    } else {
      await addDoc(collection(db,'channels',activeChannel,'messages'),{body,authorId:currentUser.uid,authorName:currentUser.displayName||currentUser.email,authorPhotoURL:currentUser.photoURL||'',createdAt:serverTimestamp()});
    }
  }catch(e){appendMsg({body,authorId:currentUser.uid,authorName:currentUser.displayName||'You',createdAt:null},'local-'+Date.now());scrollBottom();}
}

// Emoji
function buildEmojiGrid(){document.getElementById('emoji-grid').innerHTML=EMOJIS.map(e=>`<div onclick="insertEmoji('${e}')" class="text-xl cursor-pointer hover:bg-surface-container-low rounded p-1 text-center transition-colors">${e}</div>`).join('');}
document.getElementById('emoji-toggle').addEventListener('click',()=>document.getElementById('emoji-panel').classList.toggle('hidden'));
window.insertEmoji=e=>{inp.value+=e;inp.focus();sendBtn.disabled=false;sendBtn.classList.remove('opacity-50');document.getElementById('emoji-panel').classList.add('hidden');};

// Member picker modal
document.getElementById('new-dm-btn').addEventListener('click',()=>{
  document.getElementById('dm-modal').classList.remove('hidden');
  renderMemberPicker(allCommunityMembers);
});
function renderMemberPicker(members){
  const colors=['bg-secondary-fixed text-on-secondary-fixed','bg-primary-fixed text-on-primary-fixed','bg-tertiary-fixed text-on-tertiary-fixed'];
  document.getElementById('dm-member-list').innerHTML=members.length
    ?members.map(m=>`
      <div onclick="openDM('${m.id}','${(m.displayName||'Member').replace(/'/g,"\\'")}')"
        class="flex items-center gap-3 px-4 py-3 hover:bg-slate-50 cursor-pointer transition-colors">
        <div class="w-9 h-9 rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0 ${colors[(m.displayName||'U').charCodeAt(0)%3]}">${getInitials(m.displayName||'U')}</div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-semibold text-slate-900">${m.displayName||'Member'}</div>
          <div class="text-xs text-slate-400 truncate">${m.email||''}</div>
        </div>
        <span class="material-symbols-outlined text-slate-300 text-[18px]">chevron_right</span>
      </div>`).join('')
    :'<p class="text-sm text-slate-400 text-center py-8">No members found</p>';
}
document.getElementById('dm-search').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase();
  renderMemberPicker(allCommunityMembers.filter(m=>(m.displayName||'').toLowerCase().includes(q)||(m.email||'').toLowerCase().includes(q)));
});

// Online members
async function loadOnlineMembers(){
  try{
    const snap=await getDocs(collection(db,'users'));
    const cutoff=new Date(Date.now()-5*60*1000);
    let online=[],offline=[];
    snap.forEach(d=>{const u=d.data();(u.lastSeen?.toDate?.()>cutoff?online:offline).push({id:d.id,...u});});
    document.getElementById('panel-count').textContent=online.length;
    const renderU=(u,on)=>`<div class="flex items-center gap-2 p-1.5 rounded-lg hover:bg-slate-100 cursor-pointer transition-colors">
      <div class="relative" onclick="location.href='5_member_profile.html?id=${u.id}'"><div class="w-7 h-7 rounded-full bg-primary-container flex items-center justify-center text-[10px] font-bold text-on-primary-container flex-shrink-0">${getInitials(u.displayName||'U')}</div>${on?'<div class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 rounded-full border border-white"></div>':''}</div>
      <span class="text-xs font-medium text-slate-700 truncate flex-1" onclick="location.href='5_member_profile.html?id=${u.id}'">${u.displayName||'Member'}</span>
      <button onclick="openDM('${u.id}','${(u.displayName||'Member').replace(/'/g,"\\'")}')"
        class="w-6 h-6 flex items-center justify-center rounded text-slate-300 hover:text-primary hover:bg-slate-200 transition-colors" title="Send DM">
        <span class="material-symbols-outlined text-[14px]">chat</span>
      </button>
    </div>`;
    document.getElementById('panel-members').innerHTML=online.map(u=>renderU(u,true)).join('')+(offline.length?'<p class="text-[10px] text-slate-400 font-bold uppercase px-1.5 mt-3 mb-1">Offline</p>'+offline.slice(0,5).map(u=>renderU(u,false)).join(''):'');
  }catch(e){document.getElementById('panel-members').innerHTML='<p class="text-xs text-slate-400 p-2">Could not load members</p>';}
}
</script>
</body>
</html>
